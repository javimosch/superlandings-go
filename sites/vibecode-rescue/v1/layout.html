<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: "Inter", sans-serif; }
    h1, h2, h3, h4, h5, h6 { font-family: "Space Grotesk", sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #f97316 0%, #ec4899 50%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-gradient {
      background: linear-gradient(135deg, #f97316 0%, #ec4899 50%, #8b5cf6 100%);
    }
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    .vibe-glow {
      box-shadow: 0 0 40px rgba(249, 115, 22, 0.3), 0 0 80px rgba(236, 72, 153, 0.2);
    }
  </style>
</head>
<body class="bg-gray-950 min-h-screen">
  <nav class="bg-gray-900/80 backdrop-blur-md border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex">
          <div class="flex-shrink-0 flex items-center">
            <a href="{{.root}}/" class="text-2xl font-bold gradient-text">{{.brand}}</a>
          </div>
          <div class="hidden sm:ml-8 sm:flex sm:space-x-1">
            {{range .nav_pages}}
            <a href="{{$.root}}/{{.slug}}" class="text-gray-300 hover:text-white hover:bg-gray-800 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200">{{.title}}</a>
            {{end}}
          </div>
        </div>
        <div class="flex items-center">
          <a href="{{.root}}/blog" class="hero-gradient text-white px-5 py-2 rounded-lg text-sm font-medium hover:opacity-90 transition-opacity vibe-glow">
            Blog
          </a>
        </div>
      </div>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    {{.content}}
  </main>
  <footer class="bg-gray-900 border-t border-gray-800 mt-20">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <div class="text-center text-gray-500 text-sm">
        <p>© 2024 {{.brand}}. Rescuing codebases, one vibe at a time.</p>
      </div>
    </div>
  </footer>
</body>
</html>
